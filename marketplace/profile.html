<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Media Tech Support</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand"><span>MTS</span> Marketplace</a>
    <div class="navbar-actions">
      <a href="index.html" class="btn btn-secondary btn-sm">← Back to Marketplace</a>
    </div>
  </nav>

  <div style="max-width:800px;margin:32px auto;padding:0 24px;">
    <!-- Profile Header -->
    <div class="profile-header" id="profileHeader">
      <div class="profile-avatar" id="profileAvatar">U</div>
      <div class="profile-info">
        <h2 id="profileName">User</h2>
        <p id="profileRole">Buyer</p>
        <p id="profileEmail" style="font-size:13px;color:var(--gray-400);"></p>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('info', this)">Account Info</button>
      <button class="tab-btn seller-only" onclick="switchTab('products', this)">My Products</button>
      <button class="tab-btn" onclick="switchTab('orders', this)">My Orders</button>
    </div>

    <!-- Account Info Tab -->
    <div class="tab-content active" id="tab-info">
      <div class="card" style="padding:24px;">
        <h3 style="margin-bottom:16px;font-size:18px;font-weight:700;">Account Details</h3>
        <div id="accountDetails"></div>
      </div>
    </div>

    <!-- My Products Tab (Seller) -->
    <div class="tab-content" id="tab-products">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h3 style="font-size:18px;font-weight:700;">My Listed Products</h3>
        <a href="upload.html" class="btn btn-primary btn-sm">+ Add Product</a>
      </div>
      <div id="myProductsList"></div>
    </div>

    <!-- My Orders Tab -->
    <div class="tab-content" id="tab-orders">
      <h3 style="font-size:18px;font-weight:700;margin-bottom:16px;">My Orders</h3>
      <div id="myOrdersList"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Check auth
    if (!Auth.isLoggedIn()) {
      window.location.href = 'login.html';
    }

    const user = Auth.currentUser();

    // Profile header
    document.getElementById('profileAvatar').textContent = user.fullName.charAt(0).toUpperCase();
    document.getElementById('profileName').textContent = user.fullName;
    document.getElementById('profileRole').textContent = user.role === 'seller' ? 'Seller Account' : 'Buyer Account';
    document.getElementById('profileEmail').textContent = user.email;

    // Show/hide seller tabs
    document.querySelectorAll('.seller-only').forEach(el => {
      el.classList.toggle('hidden', user.role !== 'seller');
    });

    // Account details
    document.getElementById('accountDetails').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label>Full Name</label>
          <input class="form-control" value="${user.fullName}" disabled>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input class="form-control" value="${user.username}" disabled>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" value="${user.email}" disabled>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input class="form-control" value="${user.phone}" disabled>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label>Address</label>
          <input class="form-control" value="${user.address}" disabled>
        </div>
        <div class="form-group">
          <label>Role</label>
          <input class="form-control" value="${user.role === 'seller' ? 'Seller' : 'Buyer'}" disabled>
        </div>
        <div class="form-group">
          <label>Member Since</label>
          <input class="form-control" value="${new Date(user.createdAt).toLocaleDateString()}" disabled>
        </div>
      </div>
    `;

    // My Products (seller)
    function renderMyProducts() {
      const products = Products.getAll().filter(p => p.sellerId === user.id);
      const container = document.getElementById('myProductsList');
      if (!products.length) {
        container.innerHTML = '<div class="empty-state"><h3>No products listed yet</h3><p>Start selling by uploading your first product</p></div>';
        return;
      }
      container.innerHTML = products.map(p => `
        <div class="card" style="display:flex;align-items:center;padding:16px;margin-bottom:12px;cursor:default;">
          <div style="width:60px;height:60px;border-radius:var(--radius-sm);background:var(--gray-100);margin-right:16px;display:flex;align-items:center;justify-content:center;overflow:hidden;">
            ${p.images && p.images[0] ? `<img src="${p.images[0]}" style="width:100%;height:100%;object-fit:cover;">` : '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>'}
          </div>
          <div style="flex:1;">
            <div style="font-weight:700;">${p.name}</div>
            <div style="font-size:13px;color:var(--gray-500);">${getCategoryLabel(p.category)} · ${formatPrice(p.price)}</div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">Delete</button>
        </div>
      `).join('');
    }

    function deleteProduct(id) {
      if (confirm('Are you sure you want to delete this product?')) {
        Products.delete(id);
        renderMyProducts();
        showToast('Product deleted');
      }
    }

    // My Orders
    function renderMyOrders() {
      const orders = Orders.getAll().filter(o => o.buyerId === user.id);
      const container = document.getElementById('myOrdersList');
      if (!orders.length) {
        container.innerHTML = '<div class="empty-state"><h3>No orders yet</h3><p>Browse the marketplace to find products</p></div>';
        return;
      }
      container.innerHTML = orders.map(o => `
        <div class="card" style="padding:16px;margin-bottom:12px;cursor:default;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="font-weight:700;">${o.productName || 'Product'}</div>
              <div style="font-size:13px;color:var(--gray-500);">${o.id} · ${timeAgo(o.createdAt)}</div>
            </div>
            <span style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;
              background:${o.status === 'proof_submitted' ? '#d1fae5' : '#fef3c7'};
              color:${o.status === 'proof_submitted' ? '#065f46' : '#92400e'};">
              ${o.status === 'proof_submitted' ? 'Proof Sent' : 'Pending'}
            </span>
          </div>
        </div>
      `).join('');
    }

    // Tab switching
    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      btn.classList.add('active');

      if (tab === 'products') renderMyProducts();
      if (tab === 'orders') renderMyOrders();
    }
  </script>
</body>
</html>
